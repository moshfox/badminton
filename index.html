<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>El Torneig De Bàdminton</title>

<link rel="icon" type="image/png" href="./logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f6f3;
  --card:rgba(255,255,255,.82);
  --text:#101010;
  --muted:#737373;
  --line:#deded8;
  --black:#101010;
  --green:#b7ff68;
  --soft:#f1f1ec;
  --danger:#ff4b4b;
  --blue:#1769ff;
  --red:#ff3333;
  --alemanya:#7c3cff;
  --shadow:0 24px 70px rgba(0,0,0,.08);
  --match-w:240px;
  --col-gap:90px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(183,255,104,.32), transparent 34%),
    radial-gradient(circle at bottom right, rgba(124,60,255,.10), transparent 30%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
}
button,input,textarea,select{font:inherit}
button{border:0;cursor:pointer}
.hidden{display:none!important}
.lock{min-height:100vh;display:grid;place-items:center;padding:24px}
.lock-card,.hero,.panel,.admin-box{
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.78);
  box-shadow:var(--shadow);
}
.lock-card{width:min(480px,100%);border-radius:34px;padding:32px}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:900}
h1{font-size:clamp(34px,5vw,56px);line-height:.9;letter-spacing:-.07em;margin:10px 0}
h2{font-size:34px;line-height:.95;letter-spacing:-.06em;margin:10px 0}
h3{letter-spacing:-.04em}
p{color:var(--muted);line-height:1.45;margin:0}
.input{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:16px;outline:none;background:#fff;margin-top:8px}
.btn{padding:13px 17px;border-radius:999px;background:var(--black);color:#fff;font-weight:900}
.btn.secondary{background:#fff;color:#111;border:1px solid var(--line)}
.btn.green{background:var(--green);color:#111}
.btn.danger{background:var(--danger);color:#fff}
.btn.purple{background:var(--alemanya);color:#fff}
.error{color:var(--danger);font-size:14px;margin-top:12px;font-weight:800}
.app{padding:18px;max-width:1800px;margin:auto}
.hero{border-radius:30px;padding:18px 22px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:end;gap:20px;flex-wrap:wrap}
.tabs{display:flex;gap:10px;flex-wrap:wrap}
.tab{padding:11px 15px;border-radius:999px;background:#fff;border:1px solid var(--line);font-weight:900}
.tab.active{background:#111;color:#fff}
.panel{border-radius:26px;padding:20px;margin-bottom:20px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 16px}
.chip{background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;color:var(--muted)}
.chip.purple{background:#f1ebff;border-color:#d8c9ff;color:#6730d9}

.bracket-stage{position:relative;overflow:hidden;padding:0;background:#fff;border:1px solid var(--line);border-radius:26px;cursor:grab;user-select:none;height:calc(100vh - 285px);min-height:430px}
.bracket-stage:active{cursor:grabbing}
.bracket-stage-hint{position:absolute;bottom:10px;right:14px;font-size:11px;color:var(--muted);font-weight:700;pointer-events:none;z-index:10;background:rgba(255,255,255,.8);padding:4px 10px;border-radius:999px;border:1px solid var(--line)}
.bracket-viewport{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#bracketLines{position:absolute;top:0;left:0;pointer-events:none;z-index:1;overflow:visible}
.bracket{position:relative;z-index:2;display:flex;gap:var(--col-gap);align-items:flex-start;padding:24px 24px 40px}
.round-title{font-weight:900;font-size:16px;letter-spacing:-.04em}
.round-subtitle{font-size:11px;color:var(--muted);font-weight:800;margin-top:2px}
.match{width:var(--match-w);background:#fff;border:1px solid #d8d8d2;border-radius:18px;padding:10px 12px;box-shadow:0 8px 22px rgba(0,0,0,.06);position:absolute;overflow:hidden}
.match.played{border-color:#b7ff68;background:linear-gradient(135deg,#f7fff0,#fff)}
.match.postponed{border-color:#bda7ff;background:linear-gradient(135deg,#fbf8ff,#fff)}
.match.postponed::after,.event.postponed::after,.replay-card.postponed::after{
  content:"";
  position:absolute;
  inset:-18px;
  pointer-events:none;
  background:repeating-linear-gradient(135deg, transparent 0 18px, rgba(124,60,255,.18) 18px 24px);
}
.postponed-tag{position:relative;z-index:2;display:inline-flex;background:var(--alemanya);color:#fff;border-radius:999px;padding:3px 8px;font-size:9px;font-weight:900;margin-top:7px}
.match-code{font-size:10px;color:var(--muted);font-weight:900;margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.match-played-badge{background:#b7ff68;color:#2a4a00;border-radius:999px;padding:2px 7px;font-size:9px;font-weight:900;letter-spacing:.06em}
.player{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 9px;border-radius:11px;font-weight:800;font-size:13px;min-height:30px;position:relative;z-index:2}
.player + .player{margin-top:3px}
.player-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.player.winner{background:#dfffba;font-weight:900}
.player.loser{opacity:.4}
.score{background:#f1f1ec;border-radius:9px;padding:3px 7px;font-weight:900;font-size:12px;min-width:26px;text-align:center;flex-shrink:0}
.player.winner .score{background:#b7ff68}
.winner-badge{position:relative;z-index:2;display:inline-flex;align-items:center;gap:4px;background:#111;color:#fff;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:900;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

.schedule-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.timer-clock{display:flex;align-items:center;gap:8px;background:#111;color:#fff;border-radius:16px;padding:8px 14px;font-weight:900;font-size:13px;letter-spacing:-.02em}
.timer-clock .timer-date{font-size:11px;color:#aaa;font-weight:700}
.timer-dot{width:7px;height:7px;background:#b7ff68;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.schedule{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.day-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;min-height:178px;transition:border-color .2s, box-shadow .2s}
.day-card.is-today{border-color:#b7ff68;box-shadow:0 0 0 3px rgba(183,255,104,.35)}
.day-card.is-festa{background:linear-gradient(135deg,#fff5f5,#fff);border-color:#ffcfcf}
.day-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}
.day-head strong{text-transform:capitalize;letter-spacing:-.03em}
.today-badge{background:#b7ff68;color:#2a4a00;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900;letter-spacing:.06em}
.patio{background:#f7f7f3;border:1px solid var(--line);border-radius:18px;padding:10px;margin-top:8px;min-height:68px}
.patio-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:900;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.patio-playing{background:#ff4b4b;color:#fff;border-radius:999px;padding:2px 8px;font-size:9px;font-weight:900;animation:pulse 1s infinite}
.event{background:rgba(183,255,104,.58);border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:8px;font-size:12px;font-weight:800;margin-bottom:6px;position:relative;overflow:hidden}
.event.event-played{background:rgba(200,200,200,.25);opacity:.75}
.event.event-live{background:rgba(255,75,75,.15);border-color:rgba(255,75,75,.4);animation:livePulse 2s infinite}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,75,75,.3)}50%{box-shadow:0 0 0 5px rgba(255,75,75,0)}}
.event-status{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:2px 7px;font-size:9px;font-weight:900;margin-top:4px;position:relative;z-index:2}
.status-played{background:#e8e8e2;color:#555}.status-live{background:#ff4b4b;color:#fff}.status-pending{background:#f1f1ec;color:#888}.status-postponed{background:#7c3cff;color:#fff}
.festa-banner{display:flex;align-items:center;gap:10px;margin-top:10px}
.festa-banner::before,.festa-banner::after{content:"";flex:1;height:1.5px;background:linear-gradient(90deg,transparent,#ff4b4b88,transparent)}
.festa-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:900;color:#ff4b4b;white-space:nowrap}

.today-bubble,.day-message-toast{
  position:fixed;
  right:18px;
  z-index:44;
  background:#111;
  color:#fff;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 18px 45px rgba(0,0,0,.22);
  border-radius:22px;
  width:220px;
  max-width:calc(100vw - 36px);
  overflow:hidden;
}
.today-bubble{bottom:18px}
.today-bubble-head{padding:11px 13px;display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:12px;cursor:pointer}
.today-bubble-count{background:var(--green);color:#111;border-radius:999px;padding:2px 8px;font-size:11px}
.today-bubble-body{display:none;padding:0 10px 10px;max-height:280px;overflow:auto}
.today-bubble.open .today-bubble-body{display:block}
.today-item{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:8px;margin-top:7px;font-size:11px;font-weight:800}
.today-item small{display:block;color:#bbb;margin-top:3px}
.day-message-toast{
  top:18px;
  right:18px;
  width:min(390px,calc(100vw - 36px));
  padding:14px 16px;
  transform:translateY(-18px);
  opacity:0;
  pointer-events:none;
  transition:.35s ease;
  z-index:70;
}
.day-message-toast.show{transform:translateY(0);opacity:1}
.day-message-toast strong{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--green);margin-bottom:5px}
.day-message-toast p{color:#fff;font-weight:800;font-size:14px}

.replay-hero{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;align-items:stretch;margin-bottom:16px}
.replay-hero-main{background:#111;color:#fff;border-radius:28px;padding:24px;position:relative;overflow:hidden}
.replay-hero-main::after{content:"";position:absolute;width:220px;height:220px;right:-70px;top:-90px;border-radius:50%;background:radial-gradient(circle,rgba(183,255,104,.45),transparent 68%)}
.replay-hero-main h2{color:#fff;margin:8px 0 8px}
.replay-hero-main p{color:#cfcfcf;max-width:620px}
.replay-mini-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.replay-stat{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px}
.replay-stat b{font-size:30px;letter-spacing:-.07em;display:block}
.replay-stat span{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}
.replay-toolbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--line);border-radius:22px;padding:10px}
.replay-search{flex:1;min-width:220px;margin:0;background:#f7f7f3}
.replay-filter{margin:0;width:auto;min-width:170px}
.replay-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-top:16px}
.replay-card{position:relative;overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:26px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.05);cursor:pointer;transition:.18s transform,.18s box-shadow,.18s border-color;min-height:190px}
.replay-card:hover{transform:translateY(-3px);box-shadow:0 20px 48px rgba(0,0,0,.10);border-color:#b7ff68}
.replay-card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;position:relative;z-index:2}
.replay-round-pill{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;background:#111;color:#fff;border-radius:999px;padding:5px 9px}
.replay-play-pill{font-size:11px;font-weight:900;background:#dfffba;color:#2a4a00;border-radius:999px;padding:5px 9px}
.replay-title{font-size:15px;font-weight:900;line-height:1.18;letter-spacing:-.04em;position:relative;z-index:2;margin-top:16px}
.replay-score{font-size:42px;font-weight:900;letter-spacing:-.08em;margin-top:16px;position:relative;z-index:2}
.replay-winner{font-size:12px;font-weight:900;color:#2a6a00;background:#efffde;border:1px solid #d6fcb0;border-radius:999px;padding:7px 10px;display:inline-flex;margin-top:8px;position:relative;z-index:2}
.replay-bg-mark{position:absolute;right
