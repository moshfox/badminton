<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bàdminton Pro · Replay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#f7f7f4; --card:#ffffff; --text:#101010; --muted:#767676;
            --line:#e4e4df; --soft:#f1f1ed; --blue:#1769ff; --red:#ff3434;
            --green:#b7ff68; --shadow:0 18px 45px rgba(0,0,0,.08);
        }
        *{box-sizing:border-box}
        body{ 
            margin:0; font-family:Inter, sans-serif; background:var(--bg); 
            color:var(--text); overflow:hidden; height:100vh;
        }
        .app{ height:100vh; display:grid; grid-template-rows:auto auto 1fr; gap:10px; padding:12px; max-width:1200px; margin:0 auto; }
        
        /* UI de Cabecera y Marcador */
        .topbar{ display:flex; justify-content:space-between; align-items:center; }
        .brand{ background:white; padding:10px 20px; border-radius:20px; border:1px solid var(--line); box-shadow:var(--shadow); display:flex; align-items:center; gap:12px; }
        .scorebar{ display:grid; grid-template-columns:1fr auto 1fr; gap:15px; align-items:center; }
        .playerCard{ background:white; padding:15px; border-radius:24px; border:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; box-shadow:var(--shadow); }
        .p1 .score{ color:var(--blue); font-size:42px; font-weight:900; }
        .p2 .score{ color:var(--red); font-size:42px; font-weight:900; }
        .name{ font-weight:900; font-size:18px; }

        /* Contenedor del Juego */
        .main-game{ display:grid; grid-template-columns:1fr 280px; gap:12px; min-height:0; }
        .court-container{ background:white; border-radius:28px; border:1px solid var(--line); position:relative; overflow:hidden; display:flex; flex-direction:column; }
        canvas{ width:100%; height:100%; flex:1; background:#fafafa; cursor: crosshair; }
        
        /* Controles */
        .controls{ padding:15px; border-top:1px solid var(--line); display:flex; align-items:center; gap:15px; background:white; }
        .btn-play{ background:#111; color:white; border:none; padding:12px 25px; border-radius:99px; font-weight:900; cursor:pointer; }
        .progress-track{ flex:1; height:8px; background:var(--soft); border-radius:4px; position:relative; overflow:hidden; }
        .progress-fill{ height:100%; background:var(--blue); width:0%; transition: width 0.1s; }

        .overlay{
            position:absolute; inset:0; background:rgba(255,255,255,0.8); 
            display:none; flex-direction:column; align-items:center; justify-content:center; 
            backdrop-filter:blur(8px); z-index:10;
        }
        .overlay.active{ display:flex; }
    </style>
</head>
<body>

<div class="app">
    <div class="topbar">
        <div class="brand">
            <div style="width:30px;height:30px;background:var(--green);border-radius:8px"></div>
            <div>
                <small style="font-size:10px; font-weight:900; color:var(--muted)">REPETICIÓ PRO</small>
                <div class="name" id="match-title">Carregant...</div>
            </div>
        </div>
        <button class="btn-play" onclick="location.reload()" style="background:var(--soft); color:#111">Recarregar</button>
    </div>

    <div class="scorebar">
        <div class="playerCard p1">
            <div><div class="name" id="p1-name">Jugador 1</div><small>LOCAL</small></div>
            <div class="score" id="s1">0</div>
        </div>
        <div style="background:#111; color:white; padding:5px 15px; border-radius:20px; font-weight:900;">VS</div>
        <div class="playerCard p2">
            <div class="score" id="s2">0</div>
            <div style="text-align:right"><div class="name" id="p2-name">Jugador 2</div><small>VISITANT</small></div>
        </div>
    </div>

    <div class="main-game">
        <div class="court-container">
            <div class="overlay" id="winner-overlay">
                <h1 style="font-size:48px; margin:0" id="winner-text">GUANYADOR</h1>
                <button class="btn-play" onclick="resetGame()">Tornar a veure</button>
            </div>
            <canvas id="court"></canvas>
            <div class="controls">
                <button class="btn-play" id="play-btn">▶ JUGAR</button>
                <div class="progress-track"><div class="progress-fill" id="pg-fill"></div></div>
                <div id="time-display" style="font-weight:900; font-size:12px">0%</div>
            </div>
        </div>

        <aside style="display:flex; flex-direction:column; gap:10px;">
            <div class="playerCard" style="flex-direction:column; align-items:flex-start">
                <small style="font-weight:900; color:var(--muted)">ESTAT DEL PARTIT</small>
                <div id="status-desc" style="font-weight:700; margin-top:5px">Simulació activa...</div>
            </div>
        </aside>
    </div>
</div>

<script>
    const canvas = document.getElementById('court');
    const ctx = canvas.getContext('2d');
    
    // Configuración de Física Realista
    const PHYS = {
        gravity: 0.18,
        drag: 0.982, // El volante frena por las plumas
        swingRange: 0.15,
        baseSpeed: 14
    };

    let state = {
        running: false,
        progress: 0,
        score1: 0,
        score2: 0,
        shuttle: { x: 0.5, y: 0.5, vx: 0, vy: 0, angle: 0 },
        p1: { x: 0.15, y: 0.5, targetY: 0.5 },
        p2: { x: 0.85, y: 0.5, targetY: 0.5 },
        nextEvent: 0,
        side: 1 // 1 va a la derecha, -1 a la izquierda
    };

    // Datos de ejemplo (Simulando Firebase)
    const matchData = {
        p1: "Nitzer Galindo",
        p2: "Adam Singh",
        events: [1, 2, 1, 1, 2, 1, 1] // Quién gana cada punto
    };

    function init() {
        resize();
        document.getElementById('p1-name').innerText = matchData.p1;
        document.getElementById('p2-name').innerText = matchData.p2;
        document.getElementById('match-title').innerText = `${matchData.p1} vs ${matchData.p2}`;
        resetVolante();
        loop();
    }

    function resetVolante() {
        state.shuttle.x = 0.5;
        state.shuttle.y = 0.2;
        state.shuttle.vx = state.side * 0.015;
        state.shuttle.vy = 0;
    }

    function resize() {
        canvas.width = canvas.offsetWidth * window.devicePixelRatio;
        canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function update() {
        if (!state.running) return;

        // 1. Física del volante
        let s = state.shuttle;
        s.vx *= PHYS.drag;
        s.vy *= PHYS.drag;
        s.vy += PHYS.gravity * 0.0005;
        s.x += s.vx;
        s.y += s.vy;

        // Rotación basada en velocidad
        s.angle = Math.atan2(s.vy, s.vx);

        // 2. IA de Anticipación (Mueven la raqueta a donde va el volante)
        state.p1.targetY = lerp(state.p1.targetY, s.y, 0.1);
        state.p2.targetY = lerp(state.p2.targetY, s.y, 0.1);

        // 3. Colisiones (Golpeo)
        // Jugador 1
        if (s.x < state.p1.x + 0.02 && Math.abs(s.y - state.p1.targetY) < 0.15 && s.vx < 0) {
            hit(1);
        }
        // Jugador 2
        if (s.x > state.p2.x - 0.02 && Math.abs(s.y - state.p2.targetY) < 0.15 && s.vx > 0) {
            hit(-1);
        }

        // 4. Puntos
        if (s.x < 0.05 || s.x > 0.95 || s.y > 0.85) {
            awardPoint();
        }

        state.progress += 0.05;
        document.getElementById('pg-fill').style.width = Math.min(100, state.progress) + "%";
    }

    function hit(direction) {
        let s = state.shuttle;
        // El secreto del realismo: Ángulo aleatorio y potencia de salida alta
        s.vx = direction * (0.015 + Math.random() * 0.01);
        s.vy = -0.01 - Math.random() * 0.01;
        
        // Si el volante está alto, smash (hacia abajo)
        if (s.y < 0.3) s.vy = 0.02;
    }

    function awardPoint() {
        if (state.shuttle.x > 0.5) state.score1++;
        else state.score2++;
        
        document.getElementById('s1').innerText = state.score1;
        document.getElementById('s2').innerText = state.score2;
        
        state.side *= -1;
        if(state.score1 + state.score2 >= matchData.events.length) {
            state.running = false;
            document.getElementById('winner-overlay').classList.add('active');
            document.getElementById('winner-text').innerText = state.score1 > state.score2 ? matchData.p1 : matchData.p2;
        } else {
            resetVolante();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = canvas.width;
        const h = canvas.height;

        // Dibujar Pista (Líneas)
        ctx.strokeStyle = '#d9d9d2';
        ctx.lineWidth = 4;
        ctx.strokeRect(w * 0.05, h * 0.1, w * 0.9, h * 0.75);
        ctx.beginPath();
        ctx.moveTo(w * 0.5, h * 0.1); ctx.lineTo(w * 0.5, h * 0.85); // Red
        ctx.stroke();

        // Dibujar Jugadores (Raquetas)
        drawRacket(state.p1.x * w, state.p1.targetY * h, '#1769ff');
        drawRacket(state.p2.x * w, state.p2.targetY * h, '#ff3434');

        // Dibujar Volante
        ctx.save();
        ctx.translate(state.shuttle.x * w, state.shuttle.y * h);
        ctx.rotate(state.shuttle.angle);
        ctx.fillStyle = '#111';
        // Cabeza del volante
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
        // Plumas (Triángulo)
        ctx.fillStyle = 'rgba(17,17,17,0.3)';
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-20, -10); ctx.lineTo(-20, 10); ctx.closePath(); ctx.fill();
        ctx.restore();
    }

    function drawRacket(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x - 5, y - 40, 10, 80); // Mango y cabeza simplificada
        ctx.strokeStyle = '#111';
        ctx.strokeRect(x - 5, y - 40, 10, 80);
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    document.getElementById('play-btn').onclick = () => {
        state.running = !state.running;
        document.getElementById('play-btn').innerText = state.running ? "⏸ PAUSA" : "▶ JUGAR";
    };

    window.onresize = resize;
    function resetGame() {
        state.score1 = 0; state.score2 = 0; state.progress = 0;
        document.getElementById('s1').innerText = 0;
        document.getElementById('s2').innerText = 0;
        document.getElementById('winner-overlay').classList.remove('active');
        resetVolante();
        state.running = true;
    }

    init();
</script>
</body>
</html>
