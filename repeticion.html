<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repetició · Bàdminton</title>
<link rel="icon" href="./logo.png">
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Inter,system-ui,sans-serif;
  background:#f7f7f3;
  color:#111;
}
body{
  display:grid;
  place-items:center;
}
.app{
  width:min(1180px,100%);
  height:100vh;
  padding:12px;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:10px;
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.title{
  background:white;
  border:1px solid #e5e5df;
  border-radius:22px;
  padding:12px 16px;
  font-weight:900;
  letter-spacing:-.04em;
  box-shadow:0 16px 45px rgba(0,0,0,.07);
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
.btn{
  border:0;
  background:#111;
  color:white;
  border-radius:999px;
  padding:11px 15px;
  font-weight:900;
  cursor:pointer;
}
.btn.light{
  background:white;
  color:#111;
  border:1px solid #e5e5df;
}
.stage{
  min-height:0;
  position:relative;
  background:white;
  border:1px solid #e5e5df;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.08);
}
canvas{
  width:100%;
  height:100%;
  display:block;
}
.score{
  position:absolute;
  top:14px;
  left:14px;
  right:14px;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
  z-index:3;
}
.player{
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(14px);
  border:1px solid #e7e7e0;
  border-radius:18px;
  padding:10px 13px;
  min-width:180px;
  box-shadow:0 12px 35px rgba(0,0,0,.07);
}
.player.right{text-align:right}
.name{
  font-size:14px;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.num{
  margin-top:3px;
  font-size:38px;
  line-height:.85;
  font-weight:900;
}
.left .num{color:#1769ff}
.right .num{color:#ff3636}
.pointToast{
  position:absolute;
  left:50%;
  bottom:22px;
  transform:translateX(-50%);
  z-index:4;
  background:#111;
  color:white;
  border-radius:999px;
  padding:10px 16px;
  font-size:13px;
  font-weight:900;
  opacity:0;
  transition:.22s ease;
  pointer-events:none;
}
.pointToast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-4px);
}
.pointToast.blue{background:#1769ff}
.pointToast.red{background:#ff3636}
.flash{
  position:absolute;
  inset:0;
  background:rgba(255,54,54,.13);
  opacity:0;
  pointer-events:none;
  transition:.14s;
  z-index:2;
}
.flash.show{opacity:1}
.controls{
  background:white;
  border:1px solid #e5e5df;
  border-radius:24px;
  padding:12px;
  box-shadow:0 16px 45px rgba(0,0,0,.07);
}
.barTop{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:11px;
  font-weight:900;
  color:#777;
  text-transform:uppercase;
  letter-spacing:.12em;
}
.videoLine{
  position:relative;
  height:12px;
  border-radius:999px;
  background:#f0f0eb;
  border:1px solid #deded7;
  overflow:hidden;
}
.videoFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#1769ff,#7c3cff,#ff3636);
}
.seek{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  opacity:0;
  cursor:pointer;
}
.buttons{
  margin-top:12px;
  display:flex;
  justify-content:center;
  gap:8px;
}
.icon{
  width:42px;
  height:42px;
  border-radius:999px;
  border:1px solid #e5e5df;
  background:#f5f5f1;
  font-weight:900;
  cursor:pointer;
}
.play{
  width:58px;
  height:58px;
  background:#111;
  color:white;
  font-size:22px;
}
.loading{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  background:white;
  z-index:10;
  font-weight:900;
}
.hidden{display:none!important}
</style>
</head>

<body>
<div class="app">
  <div class="top">
    <div class="title" id="title">Repetició</div>
    <button class="btn light" onclick="location.href='./index.html'">← Tornar</button>
  </div>

  <main class="stage" id="stage">
    <div class="loading" id="loading">Carregant...</div>
    <canvas id="canvas"></canvas>

    <div class="score">
      <div class="player left">
        <div class="name" id="p1Name">Jugador 1</div>
        <div class="num" id="score1">0</div>
      </div>
      <div class="player right">
        <div class="name" id="p2Name">Jugador 2</div>
        <div class="num" id="score2">0</div>
      </div>
    </div>

    <div class="flash" id="flash"></div>
    <div class="pointToast" id="toast">Punt</div>
  </main>

  <section class="controls">
    <div class="barTop">
      <span id="status">Preparat</span>
      <span id="percent">0%</span>
    </div>

    <div class="videoLine">
      <div class="videoFill" id="videoFill"></div>
      <input class="seek" id="seek" type="range" min="0" max="100" step="0.1" value="0">
    </div>

    <div class="buttons">
      <button class="icon" id="restartBtn">↺</button>
      <button class="icon" id="backPointBtn">⏮</button>
      <button class="icon play" id="playBtn">▶</button>
      <button class="icon" id="nextPointBtn">⏭</button>
      <button class="icon" id="speedBtn">1×</button>
    </div>
  </section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdcQr8dLemM6ZbwwUSgEYMFFswJWUk0m4",
  authDomain: "badminton-98ddd.firebaseapp.com",
  projectId: "badminton-98ddd",
  storageBucket: "badminton-98ddd.firebasestorage.app",
  messagingSenderId: "118680568883",
  appId: "1:118680568883:web:1e381457e460115c1c4f46",
  measurementId: "G-1FCL9D6W1G"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $ = id => document.getElementById(id);

const fallbackMatches = [
  {id:"m1",p1:"Nitzer Galindo",p2:"Adam Singh Kahur",score1:"11",score2:"7",winner:"Nitzer Galindo"},
  {id:"m2",p1:"Gerard Vallès",p2:"Sami El Youssofi",score1:"",score2:"",winner:""},
  {id:"m3",p1:"Olaguer Zapater",p2:"Aran Creixell",score1:"",score2:"",winner:""},
  {id:"m4",p1:"Eloi Martinez",p2:"Adam Addahchouri",score1:"",score2:"",winner:""},
  {id:"m5",p1:"Erik Fernandez",p2:"Jan Gonzalez Queralt",score1:"",score2:"",winner:""},
  {id:"m6",p1:"Biel Cortés",p2:"Haroun Abachri Cortés",score1:"",score2:"",winner:""},
  {id:"m7",p1:"Ibrahim Allouch",p2:"Oriol Casas Barreda",score1:"",score2:"",winner:""},
  {id:"m8",p1:"Oriol Rios Baez",p2:"Pere Porta Córdoba",score1:"",score2:"",winner:""},
  {id:"m9",p1:"Logan López Cobo",p2:"Marc Pérez Trullols",score1:"",score2:"",winner:""},
  {id:"m10",p1:"Yago Vazquez Sorio",p2:"Enric Gombau Ballús",score1:"",score2:"",winner:""},
  {id:"m11",p1:"Martí Bessols Carcasè",p2:"Reda Benhattal",score1:"",score2:"",winner:""},
  {id:"m12",p1:"Sergio Ortiz Herrera",p2:"Jiddu Suárez Ibáñez",score1:"",score2:"",winner:""},
  {id:"m13",p1:"Oways Benhattal",p2:"Guim Ballester",score1:"",score2:"",winner:""},
  {id:"m14",p1:"Jugador A",p2:"Jugador B",score1:"",score2:"",winner:""}
];

const params = new URLSearchParams(location.search);
const MATCH_ID = (params.get("id") || "m1").toLowerCase();

const canvas = $("canvas");
const ctx = canvas.getContext("2d");

const assets = {
  blue:null,
  red:null,
  pilot:null
};

let match;
let points = [];
let raf;
let lastTime = 0;

let sim = {
  playing:false,
  speed:1,
  progress:0,
  duration:60,

  score1:0,
  score2:0,
  pointIndex:0,

  rallyHits:0,
  hitsBeforePoint:6,

  ball:{x:.5,y:.5,px:.5,py:.5,angle:0,scale:1},
  from:{x:.22,y:.5},
  to:{x:.78,y:.45},
  phase:0,
  hitDuration:1.1,

  r1:{x:.16,y:.5,tx:.16,ty:.5,swing:0,reach:0},
  r2:{x:.84,y:.5,tx:.84,ty:.5,swing:0,reach:0},

  miss:false,
  missTimer:0,
  missSide:0
};

function loadImg(src){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

async function loadAssets(){
  assets.blue = await loadImg("./raquet_blue.png");
  assets.red = await loadImg("./raquet_red.png");
  assets.pilot = await loadImg("./pilot.png");

  console.log("ASSETS:", {
    "raquet_blue.png": !!assets.blue,
    "raquet_red.png": !!assets.red,
    "pilot.png": !!assets.pilot
  });
}

async function loadMatch(){
  try{
    const snap = await getDoc(doc(db,"tournaments","main"));
    let list = fallbackMatches;

    if(snap.exists() && Array.isArray(snap.data().matches)){
      list = snap.data().matches;
    }

    match = list.find(m => String(m.id).toLowerCase() === MATCH_ID) || fallbackMatches[0];
  }catch(e){
    match = fallbackMatches.find(m => String(m.id).toLowerCase() === MATCH_ID) || fallbackMatches[0];
  }

  match.p1 ||= "Jugador 1";
  match.p2 ||= "Jugador 2";
  match.score1 ??= "";
  match.score2 ??= "";

  $("title").textContent = `${match.p1} vs ${match.p2}`;
  $("p1Name").textContent = match.p1;
  $("p2Name").textContent = match.p2;

  points = createPointList(match);
  sim.duration = Math.max(45, points.length * 4.8);

  resetSim();
  $("loading").classList.add("hidden");
  resize();
  draw();
}

function createPointList(m){
  const s1 = Math.max(0,parseInt(m.score1) || 0);
  const s2 = Math.max(0,parseInt(m.score2) || 0);

  let arr = [];

  for(let i=0;i<s1;i++) arr.push(1);
  for(let i=0;i<s2;i++) arr.push(2);

  if(!arr.length){
    let a = 0;
    let b = 0;
    while(a < 11 && b < 9){
      if(Math.random() > .46) a++;
      else b++;
    }
    arr = [];
    for(let i=0;i<a;i++) arr.push(1);
    for(let i=0;i<b;i++) arr.push(2);
  }

  const rng = seeded(seedFrom(m));
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(rng()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }

  return arr;
}

function resetSim(){
  sim.playing = false;
  sim.progress = 0;
  sim.score1 = 0;
  sim.score2 = 0;
  sim.pointIndex = 0;
  sim.rallyHits = 0;
  sim.hitsBeforePoint = 5 + Math.floor(Math.random()*5);
  sim.phase = 0;
  sim.hitDuration = 1.05;
  sim.miss = false;
  sim.missTimer = 0;

  sim.ball = {x:.5,y:.5,px:.5,py:.5,angle:0,scale:1};
  sim.r1 = {x:.16,y:.5,tx:.16,ty:.5,swing:0,reach:0};
  sim.r2 = {x:.84,y:.5,tx:.84,ty:.5,swing:0,reach:0};

  launchHit(true);
  updateUI();
}

function play(){
  sim.playing = true;
  lastTime = performance.now();
  $("playBtn").textContent = "⏸";
  $("status").textContent = "Reproduint";
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}

function pause(){
  sim.playing = false;
  $("playBtn").textContent = "▶";
  $("status").textContent = "Pausat";
  cancelAnimationFrame(raf);
}

function loop(t){
  const dt = Math.min((t-lastTime)/1000,.04) * sim.speed;
  lastTime = t;

  update(dt);
  draw();

  if(sim.playing) raf = requestAnimationFrame(loop);
}

function update(dt){
  if(!sim.playing) return;

  sim.progress += dt / sim.duration * 100;

  if(sim.progress >= 100){
    sim.progress = 100;
    sim.playing = false;
    $("playBtn").textContent = "▶";
    $("status").textContent = "Final";
    updateUI();
    return;
  }

  if(sim.missTimer > 0){
    sim.missTimer -= dt;

    if(sim.missSide === 1){
      sim.r1.tx = .095;
      sim.r1.ty = clamp(sim.ball.y + .23,.15,.85);
      sim.r1.swing = lerp(sim.r1.swing,-1.15,dt*5);
    }else{
      sim.r2.tx = .905;
      sim.r2.ty = clamp(sim.ball.y - .23,.15,.85);
      sim.r2.swing = lerp(sim.r2.swing,-1.15,dt*5);
    }

    moveRackets(dt);

    if(sim.missTimer <= 0){
      sim.miss = false;
      sim.ball.scale = 1;
      sim.rallyHits = 0;
      sim.hitsBeforePoint = 5 + Math.floor(Math.random()*6);
      launchHit();
    }

    updateUI();
    return;
  }

  updateBall(dt);
  moveRackets(dt);
  updateUI();
}

function updateBall(dt){
  sim.phase += dt / sim.hitDuration;
  sim.phase = Math.min(1,sim.phase);

  const e = ease(sim.phase);
  const peak = Math.min(sim.from.y,sim.to.y) - .16;

  sim.ball.x = lerp(sim.from.x,sim.to.x,e);
  sim.ball.y = quad(sim.from.y,peak,sim.to.y,e);

  const dx = sim.ball.x - sim.ball.px;
  const dy = sim.ball.y - sim.ball.py;

  if(Math.abs(dx) > .0001 || Math.abs(dy) > .0001){
    const target = Math.atan2(dy,dx);
    sim.ball.angle += norm(target - sim.ball.angle) * .22;
  }

  sim.ball.px = sim.ball.x;
  sim.ball.py = sim.ball.y;

  const goingLeft = sim.to.x < .5;
  const receivingLeft = sim.ball.x < .5;

  sim.r1.tx = receivingLeft ? .205 : .145;
  sim.r2.tx = !receivingLeft ? .795 : .855;

  sim.r1.ty = receivingLeft ? sim.ball.y : .5 + Math.sin(performance.now()*.0012)*.09;
  sim.r2.ty = !receivingLeft ? sim.ball.y : .5 + Math.cos(performance.now()*.0011)*.09;

  if(receivingLeft && sim.ball.x < .30 && sim.phase > .55){
    sim.r1.swing = Math.sin(sim.phase*Math.PI) * .95;
  }else{
    sim.r1.swing *= .88;
  }

  if(!receivingLeft && sim.ball.x > .70 && sim.phase > .55){
    sim.r2.swing = Math.sin(sim.phase*Math.PI) * .95;
  }else{
    sim.r2.swing *= .88;
  }

  if(sim.phase >= 1){
    sim.rallyHits++;

    if(sim.rallyHits >= sim.hitsBeforePoint && sim.pointIndex < points.length){
      makePoint(points[sim.pointIndex]);
    }else{
      launchHit();
    }
  }
}

function launchHit(first=false){
  const goingRight = first ? true : sim.ball.x < .5;

  sim.from = {
    x:first ? .22 : sim.ball.x,
    y:first ? .5 : sim.ball.y
  };

  sim.to = {
    x:goingRight ? random(.68,.84) : random(.16,.32),
    y:random(.22,.78)
  };

  sim.phase = 0;
  sim.hitDuration = random(1.0,1.65);
}

function makePoint(winner){
  const loser = winner === 1 ? 2 : 1;

  if(winner === 1) sim.score1++;
  else sim.score2++;

  sim.pointIndex++;
  sim.miss = true;
  sim.missSide = loser;
  sim.missTimer = 1.35;
  sim.ball.scale = .38;

  if(loser === 1){
    sim.ball.x = random(.09,.25);
    sim.ball.y = random(.18,.82);
    sim.r1.tx = .08;
    sim.r1.ty = clamp(sim.ball.y + .25,.15,.85);
  }else{
    sim.ball.x = random(.75,.91);
    sim.ball.y = random(.18,.82);
    sim.r2.tx = .92;
    sim.r2.ty = clamp(sim.ball.y - .25,.15,.85);
  }

  sim.ball.px = sim.ball.x;
  sim.ball.py = sim.ball.y;

  showToast(winner === 1 ? match.p1 : match.p2,winner);
  flash();
}

function moveRackets(dt){
  sim.r1.x += (sim.r1.tx - sim.r1.x) * Math.min(1,dt*7);
  sim.r2.x += (sim.r2.tx - sim.r2.x) * Math.min(1,dt*7);
  sim.r1.y += (sim.r1.ty - sim.r1.y) * Math.min(1,dt*7);
  sim.r2.y += (sim.r2.ty - sim.r2.y) * Math.min(1,dt*7);

  sim.r1.y = clamp(sim.r1.y,.14,.86);
  sim.r2.y = clamp(sim.r2.y,.14,.86);
}

function seekTo(percent){
  pause();

  resetSim();
  sim.progress = percent;

  const wanted = Math.floor(percent/100 * points.length);

  for(let i=0;i<wanted;i++){
    if(points[i] === 1) sim.score1++;
    else sim.score2++;
  }

  sim.pointIndex = wanted;

  sim.ball.x = .5 + Math.sin(percent*.15)*.32;
  sim.ball.y = .5 + Math.cos(percent*.11)*.25;
  sim.ball.px = sim.ball.x;
  sim.ball.py = sim.ball.y;

  launchHit();
  updateUI();
  draw();
}

function draw(){
  const W = canvas.width;
  const H = canvas.height;

  ctx.clearRect(0,0,W,H);

  drawBg(W,H);
  drawCourt(W,H);
  drawNet(W,H);

  drawRacket(sim.r1,W,H,1);
  drawRacket(sim.r2,W,H,-1);

  drawBall(W,H);
}

function drawBg(W,H){
  ctx.fillStyle = "#fbfbf8";
  ctx.fillRect(0,0,W,H);

  const g = ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.4,W*.75);
  g.addColorStop(0,"rgba(183,255,104,.16)");
  g.addColorStop(1,"rgba(183,255,104,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

function drawCourt(W,H){
  const x = W*.045;
  const y = H*.08;
  const w = W*.91;
  const h = H*.84;
  const r = W*.03;

  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,.12)";
  ctx.shadowBlur = W*.025;
  ctx.shadowOffsetY = H*.02;
  ctx.fillStyle = "#fff";
  roundRect(x,y,w,h,r);
  ctx.fill();
  ctx.restore();

  ctx.strokeStyle = "#d8d8d0";
  ctx.lineWidth = Math.max(2,W*.0022);
  roundRect(x,y,w,h,r);
  ctx.stroke();

  ctx.strokeStyle = "#ddddd6";
  ctx.lineWidth = Math.max(1.2,W*.0015);

  line(x+w*.5,y,x+w*.5,y+h);
  line(x,y+h*.16,x+w,y+h*.16);
  line(x,y+h*.84,x+w,y+h*.84);
  line(x,y+h*.34,x+w,y+h*.34);
  line(x,y+h*.66,x+w,y+h*.66);
  line(x+w*.25,y+h*.34,x+w*.25,y+h*.66);
  line(x+w*.75,y+h*.34,x+w*.75,y+h*.66);
}

function drawNet(W,H){
  const x = W*.5;

  ctx.strokeStyle = "#111";
  ctx.lineWidth = Math.max(2,W*.003);
  line(x,H*.06,x,H*.94);

  ctx.strokeStyle = "rgba(0,0,0,.18)";
  ctx.lineWidth = Math.max(1,W*.001);
  for(let y=H*.07;y<H*.94;y+=H*.035){
    line(x-W*.018,y,x+W*.018,y);
  }
}

function drawRacket(r,W,H,side){
  const x = r.x * W;
  const y = r.y * H;
  const s = W / 760;
  const img = side === 1 ? assets.blue : assets.red;

  shadow(x,y+34*s,55*s,15*s);

  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(r.swing * (side === 1 ? .5 : -.5));

  if(img){
    ctx.scale(side,1);
    ctx.drawImage(img,-52*s,-72*s,104*s,144*s);
  }else{
    ctx.strokeStyle = side === 1 ? "#1769ff" : "#ff3636";
    ctx.lineWidth = 5*s;
    ctx.beginPath();
    ctx.ellipse(0,-16*s,22*s,30*s,0,0,Math.PI*2);
    ctx.stroke();
    line(0,15*s,0,68*s);
  }

  ctx.restore();
}

function drawBall(W,H){
  const x = sim.ball.x * W;
  const y = sim.ball.y * H;
  const s = W / 760 * sim.ball.scale;

  shadow(x,y+16*s,30*s,9*s);

  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(sim.ball.angle);

  if(sim.miss){
    ctx.shadowColor = "rgba(255,54,54,.55)";
    ctx.shadowBlur = 24*s;
  }

  if(assets.pilot){
    ctx.drawImage(assets.pilot,-25*s,-19*s,50*s,38*s);
  }else{
    ctx.fillStyle = sim.miss ? "#ff3636" : "#f0d6aa";
    ctx.beginPath();
    ctx.arc(0,0,8*s,0,Math.PI*2);
    ctx.fill();
  }

  ctx.restore();

  if(!sim.miss){
    ctx.save();
    ctx.globalAlpha = .10;
    ctx.fillStyle = "#111";
    for(let i=1;i<=3;i++){
      ctx.beginPath();
      ctx.arc(
        x - Math.cos(sim.ball.angle)*i*14*s,
        y - Math.sin(sim.ball.angle)*i*14*s,
        5*s/i,
        0,
        Math.PI*2
      );
      ctx.fill();
    }
    ctx.restore();
  }
}

function updateUI(){
  $("score1").textContent = sim.score1;
  $("score2").textContent = sim.score2;
  $("videoFill").style.width = `${sim.progress}%`;
  $("seek").value = sim.progress;
  $("percent").textContent = `${Math.round(sim.progress)}%`;
}

function resize(){
  const rect = $("stage").getBoundingClientRect();
  const dpr = Math.max(1,devicePixelRatio || 1);

  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
}

function showToast(name,player){
  const t = $("toast");
  t.className = `pointToast ${player === 1 ? "blue" : "red"} show`;
  t.textContent = `Punt · ${first(name)}`;

  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"),2200);
}

function flash(){
  $("flash").classList.add("show");
  setTimeout(()=>$("flash").classList.remove("show"),180);
}

function shadow(x,y,rx,ry){
  const g = ctx.createRadialGradient(x,y,0,x,y,rx);
  g.addColorStop(0,"rgba(0,0,0,.16)");
  g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);
  ctx.fill();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function line(x1,y1,x2,y2){
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

function random(a,b){return a + Math.random()*(b-a)}
function lerp(a,b,t){return a + (b-a)*t}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function first(n){return String(n || "Jugador").split(" ")[0]}
function ease(t){return t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2}
function quad(a,b,c,t){return (1-t)*(1-t)*a + 2*(1-t)*t*b + t*t*c}
function norm(a){while(a>Math.PI)a-=Math.PI*2;while(a<-Math.PI)a+=Math.PI*2;return a}

function seedFrom(m){
  return String(m.id+m.p1+m.p2+m.score1+m.score2)
    .split("")
    .reduce((a,c)=>a+c.charCodeAt(0),0);
}

function seeded(seed){
  let s = seed || 1;
  return function(){
    s = Math.sin(s) * 10000;
    return s - Math.floor(s);
  };
}

$("playBtn").onclick = () => sim.playing ? pause() : play();
$("restartBtn").onclick = () => { pause(); resetSim(); draw(); };
$("backPointBtn").onclick = () => seekTo(Math.max(0,sim.progress - 100 / points.length));
$("nextPointBtn").onclick = () => seekTo(Math.min(100,sim.progress + 100 / points.length));

$("speedBtn").onclick = () => {
  const speeds = [1,1.25,1.5,2];
  const i = speeds.indexOf(sim.speed);
  sim.speed = speeds[(i+1)%speeds.length];
  $("speedBtn").textContent = `${sim.speed}×`;
};

$("seek").oninput = e => seekTo(Number(e.target.value));

window.addEventListener("resize",()=>{
  resize();
  draw();
});

document.addEventListener("keydown",e=>{
  if(e.code === "Space"){
    e.preventDefault();
    sim.playing ? pause() : play();
  }
});

await loadAssets();
await loadMatch();
</script>
</body>
</html>
